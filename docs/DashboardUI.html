<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family:'Plus Jakarta Sans',sans-serif; background:#f8fafc; padding:20px; }
    .card { background:white; padding:15px; border-radius:12px; border:1px solid #e2e8f0; margin-bottom:12px; }
    .st-val { font-size:24px; font-weight:800; color:#0f172a; }
    .label { font-size:10px; font-weight:800; color:#64748b; text-transform:uppercase; margin-bottom:5px; }
    .grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
  </style>
</head>
<body>
  <div class="grid" id="stats">Memuat...</div>
  <div class="card"><div class="label">Pipeline Status</div><div id="list"></div></div>
  <script>
    google.script.run.withSuccessHandler(s => {
      document.getElementById('stats').innerHTML = `
        <div class="card"><div class="label">Leads</div><div class="st-val">${s.totalLeads}</div></div>
        <div class="card" style="border-left:4px solid #10b981"><div class="label">Won</div><div class="st-val" style="color:#10b981">${s.wonLeads}</div></div>
        <div class="card"><div class="label">Income</div><div class="st-val" style="font-size:16px">Rp ${s.totalIncome.toLocaleString()}</div></div>
        <div class="card" style="border-left:4px solid #ef4444"><div class="label">Unpaid</div><div class="st-val" style="color:#ef4444; font-size:16px">Rp ${s.totalReceivables.toLocaleString()}</div></div>
      `;
      document.getElementById('list').innerHTML = Object.entries(s.statusCounts).map(([st, c]) => `
        <div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #f1f5f9; font-size:13px;">
          <b>${st}</b> <span>${c}</span>
        </div>
      `).join('');
    }).getDashboardStats();
  </script>
</body>
</html>
