<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family:'Plus Jakarta Sans',sans-serif; background:#f8fafc; padding:20px; }
    .card { background:white; padding:15px; border-radius:12px; border:1px solid #e2e8f0; margin-bottom:12px; }
    label { display:block; font-size:10px; font-weight:700; color:#475569; margin-bottom:4px; }
    input, select { width:100%; padding:10px 12px; border:1px solid #e2e8f0; border-radius:8px; font-size:13px; margin-bottom:10px; }
    .btn { background:#10b981; color:white; padding:15px; border-radius:10px; border:none; font-weight:800; width:100%; cursor:pointer; }
  </style>
</head>
<body>
  <div class="card">
    <label>Pilih Client</label><select id="leadId"></select>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
        <div><label>Tipe</label><select id="tipe"><option value="DP">DP</option><option value="Lunas">Pelunasan</option></select></div>
        <div><label>Metode</label><select id="metode"></select></div>
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
        <div><label>Jumlah (Rp)</label><input type="number" id="jumlah"></div>
        <div><label>Diskon (Rp)</label><input type="number" id="diskon" value="0"></div>
    </div>
  </div>
  <button class="btn" onclick="submit()">✅ SIMPAN PENDAPATAN</button>
  <script>
    google.script.run.withSuccessHandler(list => {
        const s = document.getElementById('leadId'); 
        list.forEach(l => s.add(new Option(`${l.nama} (${l.id})`, l.id)));
    }).getLeadList();
    google.script.run.withSuccessHandler(cfg => {
        const s = document.getElementById('metode'); 
        cfg.metode.forEach(v => s.add(new Option(v, v)));
    }).getAllConfigs();

    function submit() {
      const d = {
        leadId: document.getElementById('leadId').value, tipe: document.getElementById('tipe').value,
        metode: document.getElementById('metode').value, jumlah: document.getElementById('jumlah').value,
        diskon: document.getElementById('diskon').value
      };
      if(!d.leadId || !d.jumlah) return alert('Data tidak lengkap!');
      google.script.run.withSuccessHandler(() => google.script.host.close()).submitPaymentFromDashboard(d);
    }
  </script>
</body>
</html>
